services:
  - type: web
    name: nexa-live
    runtime: node
    region: frankfurt
    plan: starter
    autoDeploy: false
    healthCheckPath: /api/health
    buildCommand: corepack enable && corepack prepare pnpm@11.5.3 --activate && pnpm install --frozen-lockfile && pnpm --filter @hubflo/web build
    startCommand: corepack enable && pnpm --filter @hubflo/web start --hostname 0.0.0.0 --port $PORT
    disk:
      name: nexa-live-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: NEXA_STORE_PATH
        value: /var/data/nexa-live.sqlite
      - key: NEXA_WORKSPACE_MODE
        value: live
      - key: NEXA_AUTH_MODE
        value: users
      - key: NEXA_ADMIN_NAME
        value: Brian Kerr
      - key: NEXA_ADMIN_USERNAME
        value: brian.kerr
      - key: NEXA_ADMIN_EMPLOYEE_ID
        value: emp-brian
      - key: NEXA_ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://nexa-live.onrender.com
      - key: SIMPRO_API_BASE_URL
        sync: false
      - key: SIMPRO_ACCESS_TOKEN
        sync: false
      - key: SIMPRO_COMPANY_ID
        sync: false
      - key: SIMPRO_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
