<svg width="420" height="150" viewBox="0 0 420 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NeXa wordmark</title>
  <desc id="desc">NeXa wordmark with the X as a binding point.</desc>
  <text x="0" y="104" font-family="Sora, Inter, Arial, sans-serif" font-size="94" font-weight="760" letter-spacing="-2">
    <tspan fill="#202A36">Ne</tspan><tspan fill="#2E8C7D">X</tspan><tspan fill="#202A36">a</tspan>
  </text>
  <text x="4" y="136" fill="#5D6673" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="2">SERVICE COMMAND CENTER</text>
  <defs>
    <linearGradient id="xgrad" x1="0" y1="0" x2="96" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E8C7D"/>
      <stop offset="1" stop-color="#8E743E"/>
    </linearGradient>
  </defs>
</svg>
